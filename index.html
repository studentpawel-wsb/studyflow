<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow - Organizacja dla studentów</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <div class="header-left">
            <h1>📚 StudyFlow</h1>
            <p>Zorganizuj swoją naukę i bądź na bieżąco z zadaniami</p>
        </div>
        <button id="theme-toggle">🌙 Tryb ciemny</button>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">📅</div>
            <div class="stat-info">
                <span>Wszystkie zadania</span>
                <strong id="stat-total">0</strong>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📖</div>
            <div class="stat-info">
                <span>Do zrobienia</span>
                <strong id="stat-upcoming">0</strong>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">✅</div>
            <div class="stat-info">
                <span>Ukończone</span>
                <strong id="stat-completed">0</strong>
            </div>
        </div>
    </div>

    <div class="main-grid">
        <div class="left-col">
            <div class="form-card">
                <h2 id="form-title">Dodaj Zadanie</h2>
                
                <div class="form-group" id="title-group">
                    <label>Tytuł zadania *</label>
                    <input type="text" id="input-title" placeholder="np. Raport z laboratorium">
                </div>
                
                <div class="form-group">
                    <label>Przedmiot (Kategoria)</label>
                    <input type="text" id="input-subject" placeholder="np. Bazy Danych">
                </div>
                
                <div class="form-group">
                    <label>Termin oddania</label>
                    <input type="date" id="input-date">
                </div>
                
                <div class="form-group">
                    <label>Priorytet</label>
                    <select id="input-priority">
                        <option value="Niski">Niski</option>
                        <option value="Średni" selected>Średni</option>
                        <option value="Wysoki">Wysoki</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Opis (Opcjonalnie)</label>
                    <textarea id="input-desc" placeholder="Dodaj notatki..." rows="3"></textarea>
                </div>
                
                <button id="btn-add" class="btn-submit">Dodaj Zadanie</button>
                <button id="btn-cancel" class="btn-submit" style="display:none; background: transparent; color: var(--text-muted); border: 1px solid var(--border);">Anuluj edycję</button>
            </div>
        </div>

        <div class="right-col">
            <div class="controls-bar">
                <div class="control-group">
                    <label>Szukaj:</label>
                    <input type="text" id="search-input" placeholder="Wpisz nazwę...">
                </div>
                
                <div class="control-group">
                    <label>Filtruj:</label>
                    <select id="filter-subject">
                        <option value="All">Wszystkie przedmioty</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label>Sortuj:</label>
                    <select id="sort-by">
                        <option value="dueDate">Termin</option>
                        <option value="priority">Priorytet</option>
                    </select>
                </div>
                
                <div class="control-group" style="margin-left: auto;">
                    <input type="checkbox" id="show-completed" checked>
                    <label>Pokaż ukończone</label>
                </div>
            </div>

            <ul id="task-list" class="task-list">
                </ul>
        </div>
    </div>
</div>

<script src="skrypt.js"></script>
</body>
</html>
